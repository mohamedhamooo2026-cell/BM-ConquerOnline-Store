<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BMSTORE</title>
</head>
<body>
    <div id="app">جاري تحميل المتجر...</div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW_v84gr3ZU4YDaNgKWANZODvaPc9Ph_g",
            authDomain: "bm-store-e1617.firebaseapp.com",
            databaseURL: "https://bm-store-e1617-default-rtdb.firebaseio.com",
            projectId: "bm-store-e1617",
            storageBucket: "bm-store-e1617.firebasestorage.app",
            messagingSenderId: "236256567979",
            appId: "1:236256567979:web:510e73ac3a9f6df4e78dee"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // جلب كود المتجر من القاعدة
        get(ref(db, 'storeCode')).then(snapshot => {
            if (snapshot.exists()) {
                // استبدال محتوى الصفحة بالكود الموجود في القاعدة
                document.open();
                document.write(snapshot.val());
                document.close();
            } else {
                document.getElementById('app').innerText = "خطأ: لم يتم العثور على storeCode في قاعدة البيانات.";
            }
        });
    </script>
</body>
</html>
