<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BMSTORE ⚡</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .container { background: #2d2d2d; padding: 25px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        .btn { background: #e74c3c; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .fb-link { display: block; margin-top: 20px; color: #3498db; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>BMSTORE ⚡</h2>
    <div id="mainStore">
        <label>الخدمة:</label>
        <select id="serviceSelector"><option value="cps">CPs | سبس</option><option value="gold">Gold | ملايين</option></select>
        
        <label>السيرفر:</label>
        <select id="serverSelector"></select>
        
        <label>العملية:</label>
        <select id="operationSelector"><option value="sell">بيع لنا</option><option value="buy">شراء منا</option></select>
        
        <input type="number" id="amountInput" placeholder="الكمية">
        <input type="text" id="cashInput" readonly placeholder="الإجمالي سيظهر هنا">
        
        <button class="btn" onclick="orderNow()">إتمام الطلب</button>
        <a href="https://www.facebook.com/mhmd.ghfr.allh.lh.902854" target="_blank" class="fb-link">تواصل معي على فيسبوك</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const db = getDatabase(initializeApp({
        apiKey: "AIzaSyCiFo7DUunwnIPrH3MQZGy4aNiPx0L4JGQ",
        databaseURL: "https://bmstore-counter-default-rtdb.firebaseio.com"
    }));

    let globalData = null;
    onValue(ref(db, 'prices'), (snapshot) => {
        globalData = snapshot.val();
        updateDropdown();
    });

    window.updateDropdown = () => {
        const s = document.getElementById("serviceSelector").value;
        const select = document.getElementById("serverSelector");
        select.innerHTML = "";
        const groups = { 'main': { label: '⚡ MAIN ⚡', list: [] }, 'new': { label: '🔥 NEW 🔥', list: [] }, 'classic': { label: '⚔ CLASSIC ⚔', list: [] } };
        
        for (let key in globalData[s]) {
            let cat = globalData[s][key].category || 'classic';
            groups[cat].list.push({key, name: globalData[s][key].name});
        }
        
        for (let g in groups) {
            if(groups[g].list.length > 0) {
                let optgroup = document.createElement("optgroup");
                optgroup.label = groups[g].label;
                groups[g].list.forEach(item => {
                    let opt = document.createElement("option");
                    opt.value = item.key; opt.textContent = item.name;
                    optgroup.appendChild(opt);
                });
                select.appendChild(optgroup);
            }
        }
        calculate();
    }

    window.calculate = () => {
        const s = document.getElementById("serviceSelector").value;
        const serv = document.getElementById("serverSelector").value;
        const op = document.getElementById("operationSelector").value;
        const amnt = document.getElementById("amountInput").value;
        if(globalData && globalData[s] && globalData[s][serv]) {
            let total = (amnt * globalData[s][serv][op]).toFixed(2);
            document.getElementById("cashInput").value = total + " جنيه";
        }
    }

    window.orderNow = () => {
        const s = document.getElementById("serviceSelector").value;
        const serv = document.getElementById("serverSelector").options[document.getElementById("serverSelector").selectedIndex].text;
        const cash = document.getElementById("cashInput").value;
        alert("جارٍ توجيهك لفيسبوك لإتمام طلبك بخصوص: " + serv + " بقيمة " + cash);
        window.open("https://www.facebook.com/mhmd.ghfr.allh.lh.902854", "_blank");
    }

    document.getElementById("serviceSelector").onchange = updateDropdown;
    document.getElementById("serverSelector").onchange = calculate;
    document.getElementById("operationSelector").onchange = calculate;
    document.getElementById("amountInput").oninput = calculate;
</script>
</body>
</html>
