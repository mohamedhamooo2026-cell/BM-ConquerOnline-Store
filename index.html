<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMSTORE | BABA MAZZIKA - Official</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none}
        body{font-family:Tahoma;color:white;background:radial-gradient(circle at top,#1a1a2e 0%,#000 60%);min-height:100vh;padding:20px}
        .container{max-width:520px;margin:30px auto;background:rgba(10,10,10,.92);border:2px solid gold;border-radius:20px;padding:25px;box-shadow:0 0 40px rgba(255,215,0,.2)}
        .logo-text{background:linear-gradient(45deg,#FFD700,#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:42px;font-weight:900;text-align:center}
        label{display:block;margin-top:15px;color:gold;font-weight:bold}
        input,select{width:100%;padding:12px;margin-top:5px;background:#111;color:white;border:1px solid #444;border-radius:10px;font-size:16px}
        button{width:100%;padding:15px;margin-top:20px;background:linear-gradient(45deg,#ffcc00,#ff7b00);border:none;border-radius:10px;font-weight:bold;cursor:pointer;font-size:18px}
        .fb-link{display:block;text-align:center;color:#3498db;margin-top:20px;text-decoration:none;font-weight:bold}
    </style>
</head>
<body>

<div class="container">
    <div class="logo-text">BMSTORE</div>
    <h2 style="text-align:center; color:gold; margin-bottom:15px;">⚔ BABA MAZZIKA ⚔</h2>
    
    <label>العملية</label>
    <select id="o"><option value="شراء">شراء - عايز اشتري من BMSTORE</option><option value="بيع">بيع - عايز ابيع لـ BMSTORE</option></select>
    
    <label>الخدمة</label>
    <select id="p"><option value="Gold">Gold | ملايين</option><option value="CPs">CPs | سبس</option></select>
    
    <label>السيرفر</label>
    <select id="s">
        <optgroup label="⚡ MAIN SERVER ⚡">
            <option value="Lightning">Lightning (البرق) ⚡</option>
            <option value="Storm">Storm (العاصفة) 🌪</option>
        </optgroup>
        <optgroup label="🔥 NEW SERVER 🔥">
            <option value="FatalBlow">FatalBlow</option>
            <option value="ZenithZone_EU">ZenithZone_EU</option>
            <option value="FutureEnergy">FutureEnergy</option>
            <option value="Legacy_EU">Legacy_EU</option>
            <option value="WarringLands">WarringLands</option>
            <option value="EchoingSwords">EchoingSwords</option>
            <option value="TempestStrike">TempestStrike</option>
            <option value="Voyage_EU">Voyage_EU</option>
        </optgroup>
        <optgroup label="⚔ CLASSIC SERVER ⚔">
            <option value="TwinCity">TwinCity</option>
            <option value="PhoenixCastle_EU">PhoenixCastle_EU</option>
            <option value="ApeMount">ApeMount</option>
            <option value="DuneWanderer">DuneWanderer</option>
        </optgroup>
    </select>

    <label>طريقة الدفع</label>
    <select id="payment"><option value="كاش">كاش</option><option value="انستا">انستا</option></select>
    
    <label>الكمية</label>
    <input id="amount" type="number" placeholder="اكتب الكمية">
    <label>الإجمالي (جنيه)</label>
    <input id="cash" type="number" readonly placeholder="سيتم الحساب تلقائياً">

    <button onclick="sendOrder()">إتمام الطلب وإرسال العداد ⚡</button>
    <a href="https://www.facebook.com/mhmd.ghfr.allh.lh.902854" target="_blank" class="fb-link">تواصل معي على فيسبوك 👤</a>
</div>

<script type="module">
    // 1. حماية ضد الكونسول والنسخ
    Object.freeze(window);
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => { if(e.keyCode==123) e.preventDefault(); });

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, runTransaction } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const app = initializeApp({
        apiKey: "AIzaSyCiFo7DUunwnIPrH3MQZGy4aNiPx0L4JGQ",
        databaseURL: "https://bmstore-counter-default-rtdb.firebaseio.com"
    });

    const db = getDatabase(app);
    const payNumbers = { "انستا": ["01016882571"], "كاش": ["01097583583", "01064542987", "01096340085"] };

    // 2. دالة إتمام الطلب
    window.sendOrder = async () => {
        const amount = document.getElementById("amount").value;
        if(!amount) { alert("من فضلك اكتب الكمية"); return; }

        const pType = document.getElementById("payment").value;
        const options = payNumbers[pType];
        const randomNum = options[Math.floor(Math.random() * options.length)];
        
        // زيادة العداد في Firebase
        await runTransaction(ref(db, 'totalOrders'), (curr) => (curr || 0) + 1);
        
        // تجهيز نص الرسالة
        const msg = `طلب جديد من BMSTORE\n` +
                    `العملية: ${document.getElementById("o").value}\n` +
                    `الخدمة: ${document.getElementById("p").value}\n` +
                    `السيرفر: ${document.getElementById("s").value}\n` +
                    `الكمية: ${amount}\n` +
                    `طريقة الدفع: ${pType}\n` +
                    `رقم التحويل المطلوب: ${randomNum}`;
        
        window.open("https://wa.me/201097583583?text=" + encodeURIComponent(msg), "_blank");
    }

    // معادلة حساب بسيطة للكاش
    document.getElementById("amount").oninput = () => {
        document.getElementById("cash").value = (document.getElementById("amount").value * 2.5).toFixed(2);
    };
</script>
</body>
</html>
