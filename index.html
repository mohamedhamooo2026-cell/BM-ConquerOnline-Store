<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BMSTORE | BABA MAZZIKA</title>
    <!-- هنا ضع الـ Style الخاص بك كما هو -->
    <style>
        body { font-family: Tahoma; background: #000; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 2px solid gold; padding: 20px; border-radius: 20px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #222; color: #fff; border: 1px solid gold; }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- محتوى المتجر سيظهر هنا -->
    <h1>BMSTORE OFFICIAL</h1>
    <div id="content"></div>
</div>

<script>
    // 1. الحماية: هذا المتغير يمنع تشغيل الموقع على دومين غير دومينك
    const AUTHORIZED_DOMAIN = "mohamedhamooo2026-cell.github.io";

    function init() {
        // التأكد من الدومين
        if (window.location.hostname !== "" && !window.location.hostname.includes(AUTHORIZED_DOMAIN)) {
            document.body.innerHTML = "<h1 style='color:red; text-align:center;'>الموقع غير مصرح به!</h1>";
            return;
        }

        // هنا نضع المحتوى الأساسي مباشرة بدون تشفير معقد لضمان عدم حدوث الشاشة السوداء
        document.getElementById('content').innerHTML = `
            <p>مرحباً بك في متجر BABA MAZZIKA</p>
            <input type="number" id="amount" placeholder="الكمية">
            <button onclick="alert('تم الإرسال')">إرسال الطلب</button>
        `;
        
        // هنا يمكنك تفعيل الـ Firebase والعداد الخاص بك بكل حرية
        console.log("المتجر جاهز للعمل");
    }

    window.onload = init;
</script>
</body>
</html>
