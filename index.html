<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BMSTORE | جاري التحميل...</title>
</head>
<body>
    <div id="app" style="text-align:center; padding:50px; color:#555;">جاري تهيئة المتجر...</div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW_v84gr3ZU4YDaNgKWANZODvaPc9Ph_g",
            databaseURL: "https://bm-store-e1617-default-rtdb.firebaseio.com",
            projectId: "bm-store-e1617"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // جلب المحتوى من القاعدة
        get(ref(db, 'storeCode')).then(snapshot => {
            if (snapshot.exists()) {
                document.body.innerHTML = snapshot.val();
            } else {
                document.getElementById('app').innerText = "خطأ في الاتصال بالخادم.";
            }
        });
    </script>
</body>
</html>
