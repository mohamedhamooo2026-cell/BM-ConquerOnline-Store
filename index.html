<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMSTORE | Official</title>
    <style>
        body { background: #050505; color: #fff; font-family: Tahoma; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; background: #111; padding: 25px; border-radius: 25px; border: 2px solid gold; box-shadow: 0 0 20px rgba(255,215,0,0.1); }
        .logo { font-size: 35px; font-weight: 900; text-align: center; background: linear-gradient(45deg, #FFD700, #FF8C00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .contact { text-align: center; color: #888; font-size: 14px; margin-bottom: 20px; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; background: #000; color: white; border: 1px solid #444; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 15px; background: linear-gradient(45deg, #FFD700, #FF8C00); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: black; font-size: 16px; }
        .footer { margin-top: 25px; text-align: center; color: gold; font-weight: bold; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">BMSTORE</div>
    <div class="contact">BABA MAZZIKA | الخدمات الاحترافية</div>
    
    <label>نوع العملية</label>
    <select id="o" onchange="calc()"><option value="sell">شراء من المتجر</option><option value="buy">بيع للمتجر</option></select>
    
    <label>الخدمة</label>
    <select id="p" onchange="updateS()"><option value="cps">CPs (سبس)</option><option value="gold">Gold (ملايين)</option></select>
    
    <label>السيرفر</label>
    <select id="s" onchange="calc()"></select>
    
    <label>الكمية</label>
    <input type="number" id="amt" oninput="calc()" placeholder="أدخل الكمية">
    
    <label>المبلغ (EGP)</label>
    <input type="number" id="total" oninput="calcRev()" placeholder="المبلغ المطلوب">
    
    <button onclick="send()">إتمام الطلب عبر واتساب 🚀</button>
    
    <div class="footer">
        📞 للتواصل: 01097583583
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
    
    const db = getDatabase(initializeApp({databaseURL: "https://bm-store-e1617-default-rtdb.firebaseio.com"}));
    let storeData = {};

    get(ref(db, 'prices')).then(snap => {
        storeData = snap.val();
        updateS();
    });

    window.updateS = function() {
        const p = document.getElementById('p').value;
        const s = document.getElementById('s');
        s.innerHTML = '';
        for (let k in storeData[p]) {
            s.innerHTML += `<option value="${k}">${storeData[p][k].name}</option>`;
        }
        calc();
    }

    window.calc = function() {
        const p = document.getElementById('p').value, s = document.getElementById('s').value, o = document.getElementById('o').value, amt = document.getElementById('amt').value;
        if(storeData[p] && storeData[p][s]) {
            document.getElementById('total').value = (amt * storeData[p][s][o]).toFixed(2);
        }
    }
    
    window.calcRev = function() {
        const p = document.getElementById('p').value, s = document.getElementById('s').value, o = document.getElementById('o').value, total = document.getElementById('total').value;
        if(storeData[p] && storeData[p][s]) {
            document.getElementById('amt').value = (total / storeData[p][s][o]).toFixed(2);
        }
    }

    window.send = function() {
        const msg = `طلب جديد BMSTORE: ${document.getElementById('o').value} | الخدمة: ${document.getElementById('p').value} | السيرفر: ${document.getElementById('s').value} | الكمية: ${document.getElementById('amt').value} | المبلغ: ${document.getElementById('total').value} EGP`;
        window.open('https://wa.me/201097583583?text=' + encodeURIComponent(msg), '_blank');
    }
</script>

</body>
</html>
