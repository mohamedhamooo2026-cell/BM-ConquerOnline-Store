<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<div id="bm-app" style="width:100%; max-width:450px; margin:0 auto; background:#111; color:#fff; padding:20px; border-radius:20px; border:2px solid gold; font-family:tahoma; direction:rtl;">
    <h1 style="color:gold; text-align:center;">BMSTORE 👑</h1>
    
    <label>العملية</label>
    <select id="o" onchange="calc()" style="width:100%; padding:10px; margin:5px 0 10px; background:#000; color:white; border:1px solid #444;">
        <option value="sell">شراء من المتجر</option>
        <option value="buy">بيع للمتجر</option>
    </select>

    <label>الخدمة</label>
    <select id="p" onchange="updateS()" style="width:100%; padding:10px; margin:5px 0 10px; background:#000; color:white; border:1px solid #444;">
        <option value="cps">CPs (سبس)</option>
        <option value="gold">Gold (ملايين)</option>
    </select>

    <label>السيرفر</label>
    <select id="s" onchange="calc()" style="width:100%; padding:10px; margin:5px 0 10px; background:#000; color:white; border:1px solid #444;"></select>

    <label>الكمية</label>
    <input type="number" id="amt" oninput="calc()" placeholder="0" style="width:100%; padding:10px; margin:5px 0 10px; background:#000; color:white; border:1px solid #444;">

    <label>المبلغ</label>
    <input type="number" id="total" oninput="calcRev()" placeholder="0" style="width:100%; padding:10px; margin:5px 0 10px; background:#000; color:white; border:1px solid #444;">

    <button onclick="send()" style="width:100%; padding:15px; background:gold; border:none; font-weight:bold; cursor:pointer; border-radius:5px;">إتمام الطلب واتساب 🚀</button>
</div>

<script>
    const data = {
        cps: { light: {n:"Lightning ⚡", s:0.5349, b:0.4651}, storm: {n:"Storm 🌪", s:0.5349, b:0.4651}, fatalblow: {n:"FatalBlow", s:0.5349, b:0.4419} },
        gold: { light: {n:"Lightning ⚡", s:3.0, b:2.7}, storm: {n:"Storm 🌪", s:2.95, b:2.65}, fatalblow: {n:"FatalBlow", s:2.75, b:2.25} }
    };

    function updateS() {
        const s = document.getElementById('s');
        const p = document.getElementById('p').value;
        s.innerHTML = '';
        for (let k in data[p]) {
            s.innerHTML += '<option value="'+k+'">'+data[p][k].n+'</option>';
        }
        calc();
    }

    function calc() {
        const p = document.getElementById('p').value;
        const s = document.getElementById('s').value;
        const o = document.getElementById('o').value;
        const amt = document.getElementById('amt').value;
        const price = (o == 'sell') ? data[p][s].s : data[p][s].b;
        document.getElementById('total').value = (amt * price).toFixed(2);
    }

    function calcRev() {
        const p = document.getElementById('p').value;
        const s = document.getElementById('s').value;
        const o = document.getElementById('o').value;
        const total = document.getElementById('total').value;
        const price = (o == 'sell') ? data[p][s].s : data[p][s].b;
        document.getElementById('amt').value = (total / price).toFixed(2);
    }

    function send() {
        const msg = "طلب جديد: " + document.getElementById('o').value + " - " + document.getElementById('p').value + " - " + document.getElementById('s').value + " - الكمية: " + document.getElementById('amt').value;
        window.open('https://wa.me/201097583583?text=' + encodeURIComponent(msg), '_blank');
    }

    updateS();
</script>
