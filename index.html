<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMSTORE | BABA MAZZIKA</title>
    <style>
        body{background:#000;color:#fff;font-family:Tahoma;padding:20px;}
        .container{max-width:500px;margin:auto;background:#111;padding:20px;border-radius:20px;border:2px solid gold;}
        select,input{width:100%;padding:12px;margin:8px 0;background:#222;color:#fff;border:1px solid #444;border-radius:10px;}
        button{width:100%;padding:15px;background:gold;border:none;border-radius:10px;font-weight:bold;cursor:pointer;}
        .pay-box{background:#1a1a1a;padding:15px;border-radius:10px;margin:10px 0;border:1px solid gold;text-align:center;}
    </style>
</head>
<body>

<div class="container">
    <h1 style="color:gold;text-align:center;">BMSTORE 👑</h1>
    
    <label>العملية</label>
    <select id="o" onchange="calc()"><option value="sell">شراء من المتجر</option><option value="buy">بيع للمتجر</option></select>
    
    <label>الخدمة</label>
    <select id="p" onchange="loadServers()"><option value="gold">Gold</option><option value="cps">CPs</option></select>
    
    <label>السيرفر</label>
    <select id="s" onchange="calc()"></select>
    
    <label>الكمية</label>
    <input type="number" id="amt" oninput="calc()" placeholder="الكمية">
    
    <label>المبلغ (EGP)</label>
    <input type="number" id="total" oninput="calcRev()" placeholder="المبلغ">

    <div id="payDiv" class="pay-box" style="display:none;">
        <div id="payText" style="font-weight:bold; color:gold;"></div>
    </div>
    
    <button onclick="send()">إتمام الطلب عبر واتساب 🚀</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    
    // ضع بيانات مشروعك هنا
    const app = initializeApp({ databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com" });
    const db = getDatabase(app);
    
    let DATA = {};
    get(ref(db)).then(snap => {
        DATA = snap.val();
        loadServers();
    });

    window.loadServers = function() {
        const s = document.getElementById('s');
        s.innerHTML = '';
        for (let k in DATA.rates) {
            s.innerHTML += `<option value="${k}">${DATA.servers[k].name}</option>`;
        }
        calc();
    }

    window.calc = function() {
        const p = document.getElementById('p').value, s = document.getElementById('s').value, o = document.getElementById('o').value, amt = document.getElementById('amt').value;
        if(DATA.rates[s]) {
            document.getElementById('total').value = (amt * DATA.rates[s][p][o]).toFixed(2);
            showPay();
        }
    }
    
    window.calcRev = function() {
        const p = document.getElementById('p').value, s = document.getElementById('s').value, o = document.getElementById('o').value, total = document.getElementById('total').value;
        if(DATA.rates[s]) {
            document.getElementById('amt').value = (total / DATA.rates[s][p][o]).toFixed(2);
        }
    }

    window.showPay = function() {
        if(document.getElementById('o').value == 'sell') {
            document.getElementById('payDiv').style.display = 'block';
            const method = Math.random() > 0.5 ? 'كاش' : 'انستا';
            const nums = DATA.store.paymentNumbers[method];
            document.getElementById('payText').innerText = method + ": " + nums[Math.floor(Math.random()*nums.length)];
        } else {
            document.getElementById('payDiv').style.display = 'none';
        }
    }

    window.send = function() {
        const msg = `طلب جديد: ${document.getElementById('o').value} | السيرفر: ${document.getElementById('s').value} | الكمية: ${document.getElementById('amt').value}`;
        window.open('https://wa.me/'+DATA.store.whatsapp+'?text=' + encodeURIComponent(msg), '_blank');
    }
</script>
</body>
</html>
