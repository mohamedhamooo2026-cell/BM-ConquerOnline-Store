<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMSTORE | BABA MAZZIKA</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        
        const firebaseConfig = { databaseURL: "https://bm-store-e1617-default-rtdb.firebaseio.com" };
        const db = getDatabase(initializeApp(firebaseConfig));
        
        let storeData = {};
        // جلب البيانات عند فتح الصفحة
        get(ref(db, 'prices')).then(snap => {
            storeData = snap.val();
            renderServers();
        });

        window.renderServers = function() {
            const p = document.getElementById('p').value;
            const s = document.getElementById('s');
            s.innerHTML = '';
            for (let k in storeData[p]) {
                s.innerHTML += `<option value="${k}">${storeData[p][k].name}</option>`;
            }
            calc();
        }

        window.calc = function() {
            const p = document.getElementById('p').value;
            const s = document.getElementById('s').value;
            const o = document.getElementById('o').value;
            const amt = document.getElementById('amount').value;
            if(storeData[p] && storeData[p][s]) {
                document.getElementById('cash').value = (amt * storeData[p][s][o]).toFixed(2);
            }
        }
        
        window.calcRev = function() {
            const p = document.getElementById('p').value;
            const s = document.getElementById('s').value;
            const o = document.getElementById('o').value;
            const cash = document.getElementById('cash').value;
            if(storeData[p] && storeData[p][s]) {
                document.getElementById('amount').value = (cash / storeData[p][s][o]).toFixed(2);
            }
        }
    </script>
    <style>
        /* نفس التنسيقات الفخمة الخاصة بك */
        body { background: #000; color: white; font-family: Tahoma; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #111; padding: 20px; border-radius: 20px; border: 2px solid gold; }
        .btn-fb { display: block; text-align: center; background: #1877f2; color: white; padding: 15px; margin-top: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; background: #222; color: white; border: 1px solid #444; border-radius: 10px; }
        button { width: 100%; padding: 15px; background: gold; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color:gold; text-align:center;">BMSTORE 👑</h1>
    
    <label>العملية</label>
    <select id="o" onchange="calc()"><option value="sell">شراء من المتجر</option><option value="buy">بيع للمتجر</option></select>
    
    <label>الخدمة</label>
    <select id="p" onchange="renderServers()"><option value="cps">CPs</option><option value="gold">Gold</option></select>
    
    <label>السيرفر</label>
    <select id="s" onchange="calc()"></select>
    
    <label>الكمية</label>
    <input type="number" id="amount" oninput="calc()" placeholder="الكمية">
    
    <label>المبلغ (EGP)</label>
    <input type="number" id="cash" oninput="calcRev()" placeholder="المبلغ">
    
    <button onclick="send()">إتمام الطلب واتساب 🚀</button>
    
    <a href="https://www.facebook.com/mhmd.ghfr.allh.lh.902854" class="btn-fb" target="_blank">تابعنا على فيسبوك 📘</a>
</div>

<script>
    function send() {
        const msg = `طلب جديد: ${document.getElementById('o').value} - الخدمة: ${document.getElementById('p').value} - السيرفر: ${document.getElementById('s').value} - الكمية: ${document.getElementById('amount').value} - المبلغ: ${document.getElementById('cash').value} EGP`;
        window.open('https://wa.me/201097583583?text=' + encodeURIComponent(msg), '_blank');
    }
</script>

</body>
</html>
