function getPrice(){
    const server = serverSelector.value;
    const service = serviceSelector.value;
    const op = operationSelector.value;
    if(!server ||!PRICES[service][server]) return 0;
    return PRICES[service][server][op] || 0;

function checkServerAvailability(){
    const server = serverSelector.value;

    if(!server) {
        comingSoonMsg.style.display = 'none';
        sendBtn.disabled = false;
        return;
    }
    const price = PRICES[service][server];
    if(price.sell == 0 && price.buy == 0){
        comingSoonMsg.style.display = 'block';
        sendBtn.disabled = true;
        amountInput.value = '';
        cashInput.value = '';
    } else {
        comingSoonMsg.style.display = 'none';
        sendBtn.disabled = false;
    }
}

function formatBillion(num){
    const billions = Math.floor(num / 1000);
    const millions = Math.floor(num % 1000);
    if(billions > 0 && millions > 0){
        return `${billions} مليار ${millions} مليون`;
    } else if(billions > 0){
        return `${billions} مليار`;
    } else {
        return `${num} مليون`;
    }
}

function formatCash(num){
    const millions = Math.floor(num / 1000000);
    const remainderAfterMillion = num % 1000000;
    const thousands = Math.floor(remainderAfterMillion / 1000);
    const remainder = Math.floor(num % 1000);
    let parts = [];
    if(millions > 0) parts.push(`${millions} مليون`);
    if(thousands > 0) parts.push(`${thousands} الف`);
    if(remainder > 0) parts.push(`${remainder}`);
    return parts.length > 0? parts.join(' ') + ' جنيه' : `${num} جنيه`;
}

function calculateAmountToCash() {

    const amountVal = parseFloat(amountInput.value);

    }

    if(amountInput.value === "" || amountInput.value == 0){
        cashInput.value = "";
        cashBadge.style.display = "none";
        isUpdating = false;
        return;
    }

    const price = getPrice();
    const cashVal = price > 0? (amountVal * price) : 0;
    cashInput.value = cashVal.toFixed(2);

    if(cashVal >= 1000){
        cashBadge.style.display = "inline-block";
        cashBadge.textContent = `${formatCash(cashVal)} 💵`;

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
    if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.keyCode === 73) || (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault();
        return false;
    }
});
</script>

</body>
</html>
