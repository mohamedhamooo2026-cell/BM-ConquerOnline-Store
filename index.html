<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMSTORE | BABA MAZZIKA</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #000; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #111; border: 2px solid gold; padding: 25px; border-radius: 20px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        h1 { color: gold; text-align: center; }
        label { display: block; margin-top: 15px; color: gold; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; background: #222; color: #fff; border: 1px solid #444; border-radius: 10px; }
        button { width: 100%; padding: 15px; margin-top: 20px; background: gold; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
        .loading { text-align: center; color: gold; font-size: 20px; margin-top: 50px; }
    </style>
</head>
<body>

<div id="loading" class="loading">جاري تحميل المتجر...</div>

<div class="container" id="mainStore" style="display:none;">
    <h1>BMSTORE</h1>
    
    <label>العملية</label>
    <select id="operationSelector">
        <option value="sell">شراء من المتجر</option>
        <option value="buy">بيع للمتجر</option>
    </select>

    <label>السيرفر</label>
    <select id="serverSelector"></select>

    <label>الكمية</label>
    <input id="amountInput" type="number" placeholder="اكتب الكمية">

    <label>إجمالي الكاش (EGP)</label>
    <input id="cashInput" type="number" readonly placeholder="سيظهر السعر تلقائياً">

    <button id="sendOrderBtn">إرسال الطلب عبر واتساب</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCiFo7DUunwnIPrH3MQZGy4aNiPx0L4JGQ",
        databaseURL: "https://bmstore-counter-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let globalData = null;

    onValue(ref(db, 'prices/gold'), (snapshot) => {
        globalData = snapshot.val();
        if(globalData) {
            buildServerDropdown(globalData);
            document.getElementById("loading").style.display = "none";
            document.getElementById("mainStore").style.display = "block";
        }
    });

    function buildServerDropdown(data) {
        const select = document.getElementById("serverSelector");
        select.innerHTML = "";
        
        const groups = {
            'main': { label: '⚡ MAIN SERVERS ⚡', elements: [] },
            'new': { label: '🔥 NEW SERVERS 🔥', elements: [] },
            'classic': { label: '⚔ CLASSIC SERVERS ⚔', elements: [] },
            'other': { label: '🌐 OTHER SERVERS 🌐', elements: [] }
        };

        for (const [key, info] of Object.entries(data)) {
            const cat = info.category && groups[info.category] ? info.category : 'other';
            groups[cat].elements.push({ key, name: info.name || key });
        }

        for (const catKey in groups) {
            if (groups[catKey].elements.length > 0) {
                const optgroup = document.createElement("optgroup");
                optgroup.label = groups[catKey].label;
                groups[catKey].elements.forEach(el => {
                    const opt = document.createElement("option");
                    opt.value = el.key;
                    opt.textContent = el.name;
                    optgroup.appendChild(opt);
                });
                select.appendChild(optgroup);
            }
        }
    }

    document.getElementById("amountInput").oninput = () => {
        const server = document.getElementById("serverSelector").value;
        const op = document.getElementById("operationSelector").value;
        const amount = document.getElementById("amountInput").value;
        if(globalData && globalData[server]) {
            const price = globalData[server][op] || 0;
            document.getElementById("cashInput").value = (amount * price).toFixed(2);
        }
    };
</script>

</body>
</html>
