<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BMSTORE</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align: center;">BMSTORE ⚡</h2>
    <div id="status">جاري الاتصال بقاعدة البيانات...</div>
    
    <div id="content" style="display:none;">
        <label>الخدمة:</label>
        <select id="serviceSelector">
            <option value="cps">CPs | سبس</option>
            <option value="gold">Gold | ملايين</option>
        </select>

        <label>السيرفر:</label>
        <select id="serverSelector"></select>

        <label>نوع العملية:</label>
        <select id="operationSelector">
            <option value="sell">بيع</option>
            <option value="buy">شراء</option>
        </select>

        <label>الكمية:</label>
        <input type="number" id="amountInput" placeholder="أدخل الكمية">

        <label>الإجمالي:</label>
        <input type="text" id="cashInput" readonly style="background: #e9ecef; font-weight: bold;">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const app = initializeApp({
        apiKey: "AIzaSyCiFo7DUunwnIPrH3MQZGy4aNiPx0L4JGQ",
        databaseURL: "https://bmstore-counter-default-rtdb.firebaseio.com"
    });
    
    const db = getDatabase(app);
    let allData = {};

    onValue(ref(db, 'prices'), (snapshot) => {
        allData = snapshot.val() || {};
        document.getElementById('status').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        updateServers();
    });

    function updateServers() {
        const service = document.getElementById('serviceSelector').value;
        const serverSelect = document.getElementById('serverSelector');
        serverSelect.innerHTML = "";
        
        const servers = allData[service] || {};
        for (let key in servers) {
            let opt = document.createElement('option');
            opt.value = key;
            opt.innerHTML = servers[key].name;
            serverSelect.appendChild(opt);
        }
        calculate();
    }

    function calculate() {
        const service = document.getElementById('serviceSelector').value;
        const server = document.getElementById('serverSelector').value;
        const op = document.getElementById('operationSelector').value;
        const amount = document.getElementById('amountInput').value;

        if (allData[service] && allData[service][server]) {
            const price = allData[service][server][op] || 0;
            document.getElementById('cashInput').value = (amount * price).toFixed(2);
        }
    }

    document.getElementById('serviceSelector').onchange = updateServers;
    document.getElementById('serverSelector').onchange = calculate;
    document.getElementById('operationSelector').onchange = calculate;
    document.getElementById('amountInput').oninput = calculate;
</script>

</body>
</html>
